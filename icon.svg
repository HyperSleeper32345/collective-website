<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
<style>
  .bg { fill: #0A0A0F; }
  .wing { fill: none; stroke: #FFFFFF; stroke-width: 8; stroke-linejoin: round; stroke-opacity: 0.85; }
  .vein { fill: none; stroke: #FFFFFF; stroke-width: 4; stroke-opacity: 0.4; stroke-linecap: round; }
  .body { fill: none; stroke: #FFFFFF; stroke-width: 6; stroke-opacity: 0.9; stroke-linejoin: round; }
  .eye { fill: none; stroke: #5FA8FF; stroke-width: 8; }
  .accent { fill: none; stroke: #5FA8FF; stroke-width: 5; stroke-opacity: 0.7; }
  @media (prefers-color-scheme: light) {
    .bg { fill: #FFFFFF; }
    .wing { stroke: #0A0A0F; stroke-opacity: 0.85; }
    .vein { stroke: #0A0A0F; stroke-opacity: 0.4; }
    .body { stroke: #0A0A0F; stroke-opacity: 0.9; }
    .eye { stroke: #2B7DE9; }
    .accent { stroke: #2B7DE9; }
  }
</style>
<rect class="bg" width="1000" height="1000"/>

<!-- Forewings -->
<path class="wing" d="M 470 348 C 410 340, 350 330, 255 345 C 280 380, 380 388, 470 365 Z"/>
<path class="wing" d="M 530 348 C 590 340, 650 330, 745 345 C 720 380, 620 388, 530 365 Z"/>

<!-- Hindwings -->
<path class="wing" d="M 470 380 C 410 380, 350 395, 265 470 C 305 510, 410 510, 475 410 Z"/>
<path class="wing" d="M 530 380 C 590 380, 650 395, 735 470 C 695 510, 590 510, 525 410 Z"/>

<!-- Wing veins (simplified, heavier strokes for favicon) -->
<path class="vein" d="M 470 355 Q 360 358, 270 360"/>
<path class="vein" d="M 530 355 Q 640 358, 730 360"/>
<path class="vein" d="M 471 395 Q 380 420, 305 488"/>
<path class="vein" d="M 529 395 Q 620 420, 695 488"/>

<!-- Antennae tips -->
<circle cx="480" cy="210" r="6" fill="#FFFFFF" fill-opacity="0.85"/>
<circle cx="520" cy="210" r="6" fill="#FFFFFF" fill-opacity="0.85"/>
<path class="body" d="M 487 222 L 480 210"/>
<path class="body" d="M 513 222 L 520 210"/>

<!-- Compound eyes (Collective Blue accent) -->
<ellipse class="eye" cx="472" cy="258" rx="48" ry="42"/>
<ellipse class="eye" cx="528" cy="258" rx="48" ry="42"/>

<!-- Thorax -->
<ellipse class="body" cx="500" cy="338" rx="26" ry="48"/>

<!-- Abdomen -->
<path class="body" d="M 484 386 L 494 778 L 506 778 L 516 386 Z"/>

<!-- Tail tips -->
<path class="body" d="M 494 778 L 491 800"/>
<path class="body" d="M 506 778 L 509 800"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" width="400" height="150">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&amp;display=swap');
    </style>
  </defs>
  <!-- Butterfly icon scaled to fit left side with ~8% padding -->
  <g transform="translate(12, 15) scale(0.3)">
    <!-- Upper wings -->
    <path fill="none" stroke="#FFFFFF" stroke-width="1.6" d="M200 200 C180 160,120 100,90 80 C60 60,40 90,50 130 C55 155,70 180,100 195 C130 210,170 210,200 200Z"/>
    <path fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.1" d="M200 200 C185 175,140 130,110 115 C85 102,65 120,72 150 C78 170,90 188,110 195 C140 205,175 207,200 200Z"/>
    <!-- Veins left -->
    <line stroke="#5FA8FF" stroke-width="0.8" opacity="0.7" x1="200" y1="200" x2="90" y2="80"/>
    <line stroke="#5FA8FF" stroke-width="0.8" opacity="0.6" x1="200" y1="200" x2="50" y2="130"/>
    <line stroke="#5FA8FF" stroke-width="0.8" opacity="0.6" x1="200" y1="200" x2="100" y2="195"/>
    <!-- Right upper wings -->
    <path fill="none" stroke="#FFFFFF" stroke-width="1.6" d="M200 200 C220 160,280 100,310 80 C340 60,360 90,350 130 C345 155,330 180,300 195 C270 210,230 210,200 200Z"/>
    <path fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.1" d="M200 200 C215 175,260 130,290 115 C315 102,335 120,328 150 C322 170,310 188,290 195 C260 205,225 207,200 200Z"/>
    <!-- Veins right -->
    <line stroke="#5FA8FF" stroke-width="0.8" opacity="0.7" x1="200" y1="200" x2="310" y2="80"/>
    <line stroke="#5FA8FF" stroke-width="0.8" opacity="0.6" x1="200" y1="200" x2="350" y2="130"/>
    <line stroke="#5FA8FF" stroke-width="0.8" opacity="0.6" x1="200" y1="200" x2="300" y2="195"/>
    <!-- Lower wings -->
    <path fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.1" d="M200 200 C180 220,130 270,115 290 C100 310,120 330,150 310 C170 296,188 270,195 240 C200 220,200 210,200 200Z"/>
    <path fill="none" stroke="rgba(255,255,255,0.6)" stroke-width="1.1" d="M200 200 C220 220,270 270,285 290 C300 310,280 330,250 310 C230 296,212 270,205 240 C200 220,200 210,200 200Z"/>
    <!-- Body -->
    <line stroke="rgba(255,255,255,0.95)" stroke-width="2.2" stroke-linecap="round" x1="200" y1="140" x2="200" y2="280"/>
    <!-- Antennae -->
    <path fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.1" d="M200 145 C195 125,180 105,175 95"/>
    <path fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.1" d="M200 145 C205 125,220 105,225 95"/>
    <!-- Antenna tips -->
    <circle fill="#5FA8FF" opacity="0.85" cx="175" cy="95" r="2.8"/>
    <circle fill="#5FA8FF" opacity="0.85" cx="225" cy="95" r="2.8"/>
  </g>
  <!-- "Collective" text -->
  <text x="130" y="88" font-family="'Playfair Display', Georgia, serif" font-weight="700" font-size="42" fill="#FFFFFF" letter-spacing="0.01em">Collective</text>
  <!-- Tagline -->
  <text x="131" y="110" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="0.08em" text-transform="uppercase">MAKE REVENUE MEASURABLE</text>
</svg>
